<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员 · 修改余额</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0e14;
      color: #e8edf5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 30px 16px;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
    }
    .header h1 span {
      color: #00a6ff;
    }

    .header .badge {
      background: rgba(255, 107, 107, 0.15);
      color: #ff6b6b;
      font-size: 12px;
      padding: 4px 14px;
      border-radius: 20px;
      font-weight: 600;
    }

    .status-bar {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 10px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #6a7b94;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-bar .ok {
      color: #4cdf8b;
    }
    .status-bar .fail {
      color: #ff6b6b;
    }

    .user-list {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      overflow: hidden;
    }

    .user-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .user-row:last-child {
      border-bottom: none;
    }

    .user-row .info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }

    .user-row .info .id {
      font-family: monospace;
      font-size: 14px;
      font-weight: 600;
      color: #4fc3ff;
      min-width: 60px;
    }

    .user-row .info .name {
      font-size: 14px;
      color: #b0c4dd;
    }

    .user-row .info .note {
      font-size: 12px;
      color: #4a5a72;
      margin-left: 6px;
    }

    .user-row .balance-display {
      font-size: 15px;
      font-weight: 600;
      color: #4cdf8b;
      margin-right: 12px;
      min-width: 70px;
      text-align: right;
    }

    .user-row .edit-btn {
      background: rgba(0, 166, 255, 0.12);
      border: 1px solid rgba(0, 166, 255, 0.15);
      color: #4fc3ff;
      padding: 4px 14px;
      border-radius: 12px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .user-row .edit-btn:hover {
      background: rgba(0, 166, 255, 0.2);
    }

    /* ===== 弹窗 ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #1a212a;
      border-radius: 24px;
      padding: 32px 28px;
      max-width: 380px;
      width: 90%;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .modal h2 {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .modal .sub {
      font-size: 14px;
      color: #6a7b94;
      margin-bottom: 20px;
    }

    .modal .sub strong {
      color: #4fc3ff;
    }

    .modal label {
      font-size: 13px;
      color: #8899b0;
      display: block;
      margin-bottom: 6px;
    }

    .modal input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: #e8edf5;
      font-size: 18px;
      font-weight: 600;
      outline: none;
      transition: 0.2s;
      margin-bottom: 18px;
    }

    .modal input:focus {
      border-color: #00a6ff;
      background: rgba(0, 166, 255, 0.06);
    }

    .modal .btn-row {
      display: flex;
      gap: 10px;
    }

    .modal .btn-row button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .modal .btn-row .btn-save {
      background: linear-gradient(135deg, #0088cc, #00a6ff);
      color: #fff;
    }

    .modal .btn-row .btn-save:active {
      transform: scale(0.96);
    }

    .modal .btn-row .btn-cancel {
      background: rgba(255, 255, 255, 0.06);
      color: #6a7b94;
    }

    .modal .btn-row .btn-cancel:active {
      transform: scale(0.96);
    }

    .modal .msg {
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
    }

    .modal .msg.success {
      color: #4cdf8b;
    }
    .modal .msg.error {
      color: #ff6b6b;
    }

    .empty-msg {
      padding: 40px 20px;
      text-align: center;
      color: #4a5a72;
      font-size: 14px;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #3a4a62;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 20px;
    }

    .footer a {
      color: #4a7a9c;
      text-decoration: none;
    }

    /* ===== 刷新按钮 ===== */
    .refresh-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #6a7b94;
      padding: 4px 14px;
      border-radius: 12px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .refresh-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #b0c4dd;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>⚙️ 管理员 · <span>修改余额</span></h1>
    <span class="badge">🔒 仅限管理员</span>
  </div>

  <div class="status-bar">
    <span id="statusText">📦 数据状态: <span class="fail">未加载</span></span>
    <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
  </div>

  <div class="user-list" id="userList">
    <div class="empty-msg">⏳ 加载用户数据中...</div>
  </div>

  <div class="footer">
    <a href="index.html">← 返回用户查询页面</a>
  </div>

</div>

<!-- ===== 修改弹窗 ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">修改余额</h2>
    <div class="sub">用户: <strong id="modalUserId">-</strong> (<span id="modalUserName">-</span>)</div>

    <label>💰 新余额 (USDT)</label>
    <input type="number" id="modalBalanceInput" step="0.01" min="0" />

    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveBalance()">💾 保存</button>
    </div>
    <div class="msg" id="modalMsg"></div>
  </div>
</div>

<script>
  var DATA_URL = 'data.json';
  var userData = null;
  var config = null;
  var currentEditId = null;

  var userList = document.getElementById('userList');
  var statusText = document.getElementById('statusText');

  // ===== 加载数据 =====
  async function loadData() {
    statusText.innerHTML = '📦 数据状态: <span class="fail">加载中...</span>';

    try {
      var response = await fetch(DATA_URL + '?t=' + Date.now());

      if (!response.ok) {
        throw new Error('HTTP ' + response.status);
      }

      var json = await response.json();

      if (!json.users || typeof json.users !== 'object') {
        throw new Error('数据格式错误');
      }

      userData = json.users;
      config = json.config || {};

      renderUserList();
      statusText.innerHTML = '📦 数据状态: <span class="ok">✅ 已加载 (' + Object.keys(userData).length + ' 个用户)</span>';

    } catch (error) {
      console.error('加载失败:', error);
      statusText.innerHTML = '📦 数据状态: <span class="fail">❌ 加载失败: ' + error.message + '</span>';
      userList.innerHTML = '<div class="empty-msg">❌ 加载失败，请刷新重试</div>';
    }
  }

  // ===== 渲染用户列表 =====
  function renderUserList() {
    if (!userData || Object.keys(userData).length === 0) {
      userList.innerHTML = '<div class="empty-msg">📭 暂无用户数据</div>';
      return;
    }

    var ids = Object.keys(userData);
    var html = '';

    for (var i = 0; i < ids.length; i++) {
      var id = ids[i];
      var user = userData[id];
      var balance = user.balance || 0;

      html += `
        <div class="user-row">
          <div class="info">
            <span class="id">${id}</span>
            <span class="name">${user.name || '未命名'}</span>
            ${user.note ? '<span class="note">· ' + user.note + '</span>' : ''}
          </div>
          <div class="balance-display">${balance.toFixed(2)}</div>
          <button class="edit-btn" onclick="openModal('${id}')">修改</button>
        </div>
      `;
    }

    userList.innerHTML = html;
  }

  // ===== 打开弹窗 =====
  function openModal(id) {
    var user = userData[id];
    if (!user) return;

    currentEditId = id;
    document.getElementById('modalUserId').textContent = id;
    document.getElementById('modalUserName').textContent = user.name || '未命名';
    document.getElementById('modalBalanceInput').value = user.balance || 0;
    document.getElementById('modalMsg').textContent = '';
    document.getElementById('modalMsg').className = 'msg';
    document.getElementById('modalOverlay').classList.add('active');
    document.getElementById('modalBalanceInput').focus();
    document.getElementById('modalBalanceInput').select();
  }

  // ===== 关闭弹窗 =====
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    currentEditId = null;
  }

  // ===== 保存余额 =====
  function saveBalance() {
    var input = document.getElementById('modalBalanceInput');
    var msg = document.getElementById('modalMsg');
    var value = parseFloat(input.value);

    if (isNaN(value) || value < 0) {
      msg.textContent = '⚠️ 请输入有效的正数金额';
      msg.className = 'msg error';
      return;
    }

    if (!currentEditId || !userData[currentEditId]) {
      msg.textContent = '❌ 用户不存在';
      msg.className = 'msg error';
      return;
    }

    // 修改内存中的数据
    userData[currentEditId].balance = value;

    // 保存到 localStorage（临时备份，防止刷新丢失）
    try {
      localStorage.setItem('admin_backup_' + currentEditId, value.toString());
    } catch (e) {
      // 忽略
    }

    msg.textContent = '✅ 修改成功！请点击「保存到文件」按钮导出 data.json';
    msg.className = 'msg success';

    // 更新列表显示
    renderUserList();

    // 自动下载更新后的 data.json
    downloadDataJson();

    // 延迟关闭弹窗
    setTimeout(function() {
      closeModal();
    }, 1200);
  }

  // ===== 自动下载 data.json =====
  function downloadDataJson() {
    var jsonData = {
      users: userData,
      config: config || { apy: 0.165, lockYears: "5 / 10", projectName: "TON401k" }
    };

    var jsonStr = JSON.stringify(jsonData, null, 2);
    var blob = new Blob([jsonStr], { type: 'application/json' });
    var url = URL.createObjectURL(blob);

    var a = document.createElement('a');
    a.href = url;
    a.download = 'data.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ===== 点击弹窗外关闭 =====
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) {
      closeModal();
    }
  });

  // ===== 键盘快捷键：Enter 保存，Esc 关闭 =====
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeModal();
    }
    if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('active')) {
      saveBalance();
    }
  });

  // ===== 启动 =====
  loadData();

  console.log('💡 管理员工具已启动');
  console.log('💡 修改后会自动下载 data.json，覆盖原文件即可');
</script>

</body>
</html>
